name: Java CI with Gradle

on:
  push:
    branches: [ "dev", "main", "ci/build-test" ] # л©”мқём—җ н‘ёмӢңлҗҳл©ҙ
  pull_request:
    branches: [ "dev", "main", "ci/build-test" ] # л©”мқём—җ PRлҗҳл©ҙ

jobs:
  build: # мІ« лІҲм§ё мһ‘м—…
    ### н…ҢмҠӨнҠёмҡ© mysql
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        #mysql м„Өм •
        env:
          # MYSQL_USER : м§Җм •н•ҳм§Җ м•ҠмқҖкІҪмҡ° root
          MYSQL_ROOT_PASSWORD: 12345678 # л№„л°ҖлІҲнҳё
          MYSQL_DATABASE: actions_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping --silent" --health-start-period=30s --health-timeout=5s --health-retries=3

    env:
      SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/actions_test
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 12345678
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${{ secrets.SPRING_DATASOURCE_DRIVER_CLASS_NAME }}
    permissions:
      pull-requests: write  # PRм—җ лҢ“кёҖ, мІҙнҒ¬ мӢӨн–үмқ„ н•  мҲҳ мһҲлҠ” к¶Ңн•ң
      checks: write          # мІҙнҒ¬ кІ°кіјлҘј кё°лЎқн•  к¶Ңн•ң
      actions: read          # GitHub Actionsмқҳ м •ліҙлҘј мқҪмқ„ мҲҳ мһҲлҠ” к¶Ңн•ң

    steps:
      - uses: actions/checkout@v4 # actions/checkoutмқҳ лІ„м „мқҙ v4, к№ғн—ҲлёҢ м•Ўм…ҳ мӢӨн–ү нҷҳкІҪмңјлЎң ліөмӮ¬

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.docker-layers
          key: ${{ runner.os }}-docker-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Pull MySQL Image
        run: docker pull mysql:5.7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Gradle WrapperлЎң л№Ңл“ң мӢӨн–ү
      - name: Build with Gradle Wrapper
        run: ./gradlew clean build

      # Gradle м„Өм • л°Ҹ мқҳмЎҙм„ұ мәҗмӢұ
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle Wrapper
        run: ./gradlew build

      - name: Run tests # н…ҢмҠӨнҠё мӢӨн–ү
        run: ./gradlew test

      - name: Upload Test Results # н…ҢмҠӨнҠё кІ°кіј ліҙкі 
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/test

  dependency-submission: # л‘җ лІҲм§ё мһ‘м—…
    needs: build

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Generates and submits a dependency graph, enabling Dependabot Alerts for all project dependencies.
      # See: https://github.com/gradle/actions/blob/main/dependency-submission/README.md
      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
